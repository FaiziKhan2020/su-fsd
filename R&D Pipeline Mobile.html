<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>R&D Pipeline · Mobile</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0F0F11;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      color: #0F0F11; }
    body { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .stage { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .label { color: #B5B6BE; font-size: 12px; font-weight: 500; text-align: center; margin-top: 12px;
      letter-spacing: 0.05em; text-transform: uppercase; }
    /* Hide IOS frame's default scroll behavior — we manage scrolling inside */
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#1F66F5" />
      <rect x="30" y="20" width="40" height="60" rx="6" fill="#fff" />
      <rect x="36" y="32" width="28" height="3" rx="1.5" fill="#1F66F5" />
      <rect x="36" y="40" width="20" height="2" rx="1" fill="#B5B6BE" />
      <rect x="36" y="46" width="24" height="2" rx="1" fill="#B5B6BE" />
      <rect x="36" y="56" width="28" height="3" rx="1.5" fill="#1F66F5" />
      <rect x="36" y="64" width="22" height="2" rx="1" fill="#B5B6BE" />
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" class="stage"></div>

  <script type="text/babel" src="mobile/ios-frame.jsx"></script>
  <script type="text/babel" src="mobile/data.jsx"></script>
  <script type="text/babel" src="mobile/app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { IOSDevice, MobileApp } = window;
    function Stage() {
      return (
        <>
          <div>
            <IOSDevice width={402} height={874} statusBar={{ time: "8:42", battery: 82 }} showHomeIndicator>
              <MobileApp />
            </IOSDevice>
            <div className="label">R&D Pipeline · iPhone</div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Stage />);
  </script>
</body>
</html>
