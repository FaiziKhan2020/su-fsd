  <style>
    /* Dossier overlay v3 — same shell as v2 */
    .dossier-overlay { position: fixed; inset: 0; background: oklch(20% 0.005 80 / 0.4); z-index: 90; display: flex; justify-content: flex-end; }
    .dossier { width: min(1280px, 96vw); height: 100vh; background: var(--bg); display: grid; grid-template-columns: 1fr 340px; grid-template-rows: auto auto auto 1fr; grid-template-areas: "head head" "title title" "tabs tabs" "body rail"; box-shadow: -8px 0 32px rgba(0,0,0,0.1); animation: slideIn 0.18s ease-out; }
    .dossier.ai-collapsed { grid-template-columns: 1fr 0; }
    .dossier.ai-collapsed .dossier-rail { display: none; }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .dossier-head { grid-area: head; display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--line); }
    .dossier-title { grid-area: title; padding: 18px 20px 14px; }
    .dossier-tabs { grid-area: tabs; display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--line); }
    .dossier-tabs button { background: transparent; border: 0; padding: 10px 14px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--ink-3); font: inherit; font-size: 13px; font-weight: 500; }
    .dossier-tabs button.active { color: var(--ink); border-bottom-color: var(--accent); }
    .dossier-body { grid-area: body; overflow-y: auto; padding: 20px; }
    .dossier-rail { grid-area: rail; border-left: 1px solid var(--line); padding: 18px 16px; overflow-y: auto; background: var(--bg-2); }

    .btn.promote { background: var(--ok-bg); color: var(--ok); border: 1px solid oklch(85% 0.06 150); }
    .btn.promote:hover { background: var(--ok); color: white; }
    .btn.reject { background: transparent; color: var(--ink-3); border: 1px solid var(--line); }
    .btn.reject:hover { color: var(--err); border-color: var(--err); }
  </style>
</head>
